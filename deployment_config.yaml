http:
  port: 8000
  health_check_path: /
name: LangChain Chat Agent
summary: A chat-based agent built with LangChain that can interact with various tools and provide responses using a language model. It supports tool execution through a JSON-based action format and includes a FastAPI server for HTTP interactions.
environment_variables:
  - name: OPENAI_API_KEY
    value: <your_openai_api_key>
    description: The OpenAI API key required for the language model to function
  - name: DEFAULT_MODEL_NAME
    value: gpt-3.5-turbo
    description: The default OpenAI model to use for the chat agent (e.g., gpt-3.5-turbo, gpt-4)
  - name: OPENAI_BASE_URL
    value: https://api.openai.com/v1
    description: The base URL for OpenAI API endpoints (optional - defaults to OpenAI's standard endpoint)


